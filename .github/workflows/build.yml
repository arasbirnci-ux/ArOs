name: Android Build OS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Adim 1 - Kodları Kontrol Et
        uses: actions/checkout@v4

      - name: Adim 2 - Ortamı Hazırla
        run: |
          echo "Kurulum başlıyor..."
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Adim 3 - Repo Başlatma ve İndirme
        run: |
          mkdir -p android-lab
          cd android-lab
          # Burada repo'nun kurulup kurulmadığını test ediyoruz
          ~/bin/repo --version
          # İndirme komutunu çok daha basitleştirdik
          ~/bin/repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r20
          ~/bin/repo sync -c -j$(nproc) --depth=1
